name: Task
description: A defined piece of work (internal or contributor)
labels: ["type:task", "status:ready"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Task outcome
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: textarea
    id: test-strategy
    attributes:
      label: Test strategy
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core
        - cli
        - sdk-python
        - gateway-api
        - risk-engine
        - evidence-vault
        - doc-generator
        - egress-proxy
        - infra
        - docs
    validations:
      required: true
