name: Feature request
description: Propose a new feature or improvement
labels: ["type:feature", "status:ready"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core
        - cli
        - sdk-python
        - gateway-api
        - risk-engine
        - evidence-vault
        - doc-generator
        - egress-proxy
        - infra
        - docs
    validations:
      required: true
