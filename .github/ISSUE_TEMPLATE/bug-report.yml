name: Bug report
description: Something isn't working correctly
labels: ["type:bug", "status:ready"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report this. Please fill in all fields."
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `opencomplai check --manifest example.json`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Python: 3.11.4
        - Node.js: 20.11.0
        - OS: Ubuntu 22.04
        - opencomplai version: 0.1.0
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What does a correct fix look like?
    validations:
      required: false
