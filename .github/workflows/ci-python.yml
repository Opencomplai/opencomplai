name: CI — Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint / Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test-core:
    name: Test / core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - run: uv run pytest packages/core -v --tb=short

  test-cli:
    name: Test / cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - run: uv run pytest packages/cli -v --tb=short

  test-sdk:
    name: Test / sdk-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - run: uv run pytest packages/sdk-python -v --tb=short

  test-services:
    name: Test / Python services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - run: uv run pytest services/risk-engine services/evidence-vault services/doc-generator services/egress-proxy -v --tb=short

  cli-check:
    name: CLI / compliance check (local engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - name: Run compliance init
        run: |
          uv run opencomplai init \
            --system-id "ci-sample-system" \
            --intended-purpose "customer support chatbot" \
            --output /tmp/ci-manifest.json
      - name: Run compliance check (local, expect exit 0 for minimal risk)
        run: |
          uv run opencomplai check \
            --manifest /tmp/ci-manifest.json \
            --commit-ref "${{ github.sha }}" \
            --scan-mode ci \
            --output json
      - name: Verify artifact was written
        run: test -f compliance-artifact.json
      - name: Upload status artifact
        uses: actions/upload-artifact@v4
        with:
          name: compliance-artifact-${{ github.sha }}
          path: compliance-artifact.json
          retention-days: 90
      - name: Run compliance check (trap path, expect exit 4)
        run: |
          cat > /tmp/trap-manifest.json << 'EOF'
          {
            "system_id": "ci-trap-test",
            "intended_purpose": "employment screening and ranking",
            "compliance_target": "EU_AI_ACT",
            "high_risk_presumption": false,
            "commit_ref": "HEAD"
          }
          EOF
          uv run opencomplai check \
            --manifest /tmp/trap-manifest.json \
            --commit-ref "${{ github.sha }}" \
            --scan-mode ci \
            --output json || true

  egress-dlp:
    name: DLP / egress-proxy allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - name: Run DLP test suite (REQ-ARC-001)
        run: uv run pytest services/egress-proxy/tests/test_dlp.py -v --tb=short
      - name: Verify zero forbidden fields invariant
        run: |
          uv run python <<'PY'
          from opencomplai_egress_proxy.allowlist import ALLOWED_FIELDS, validate_payload
          bad = [('raw_inference_payload', 'secret'), ('model_weights', 'bin')]
          for k, v in bad:
              assert not validate_payload({k: v})[0], f"forbidden field leaked: {k}"
          print('DLP invariant OK — forbidden fields correctly blocked')
          PY

  security:
    name: Security scan / Python (ISO 27001 A.8.8 / SOC 2 CC7.1 / NIST ID.RA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - name: Install pip-audit
        run: uv pip install pip-audit
      - name: pip-audit (fail on any finding)
        run: uv run pip-audit

  ai-package-gate:
    name: AI/LLM package gate (EU AI Act Art. 3/50 / ISO 27001 A.5.7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan pyproject.toml files for unapproved AI/LLM packages
        run: |
          FORBIDDEN="openai anthropic transformers torch tensorflow langchain llm sentence-transformers diffusers accelerate"
          INVENTORY="docs/security/ai-inventory.md"
          FOUND=0
          for pkg in $FORBIDDEN; do
            matches=$(grep -rn "\"$pkg\"\\|'$pkg'" --include="pyproject.toml" . || true)
            if [ -n "$matches" ]; then
              # Check if this package is in the approved inventory
              if ! grep -q "$pkg" "$INVENTORY" 2>/dev/null; then
                echo "FAIL: Unapproved AI/LLM package found: $pkg"
                echo "$matches"
                FOUND=1
              else
                echo "OK: $pkg found but listed in ai-inventory.md"
              fi
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "To approve a new AI dependency, add it to $INVENTORY and get CISO sign-off."
            exit 1
          fi
          echo "AI package gate passed — no unapproved AI/LLM dependencies found."
