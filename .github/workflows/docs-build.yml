name: Build Documentation

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/build-docs.*'
      - 'scripts/check-links.py'
      - 'packages/**'
      - 'services/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/build-docs.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q -r requirements-docs.txt

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/checker-widget/package-lock.json

      - name: Build checker widget
        run: |
          cd docs/checker-widget && npm ci && npm run build && npm test

      - name: Build documentation
        run: |
          cd docs && mkdocs build --strict && cd ..

      - name: Check links
        run: |
          python scripts/check-links.py
        continue-on-error: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: site/
          retention-days: 7

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Documentation built successfully! Build artifacts available for preview.'
            })
