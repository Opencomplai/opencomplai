[project]
name = "opencomplai-ai"
version = "0.1.0"
description = "AI-powered intent classification plugin for Opencomplai (EU AI Act)"
license = { text = "AGPL-3.0-only" }
authors = [{ name = "Opencomplai", email = "hello@opencomplai.com" }]
requires-python = ">=3.11"
dependencies = [
    "opencomplai-core>=0.1.0",
    "onnxruntime>=1.18",
    "transformers>=4.40",
    "huggingface-hub>=0.23",
    "rich>=13",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://opencomplai.com"
Documentation = "https://docs.opencomplai.com"

[project.optional-dependencies]
deep = [
    "llama-cpp-python>=0.3.0",
]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opencomplai_ai"]
