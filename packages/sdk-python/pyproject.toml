[project]
name = "opencomplai"
version = "0.2.0-dev"
description = "Opencomplai Python SDK for EU AI Act compliance"
readme = "README.md"
license = { text = "AGPL-3.0-only" }
authors = [{ name = "Opencomplai", email = "hello@opencomplai.com" }]
requires-python = ">=3.11"
dependencies = [
    "opencomplai-core>=0.2.0-dev",
    "opencomplai-cli>=0.2.0-dev",
]

[project.urls]
Homepage = "https://opencomplai.com"
Documentation = "https://docs.opencomplai.com"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
